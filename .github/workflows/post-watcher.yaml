name: PostWatcher
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post-watcher:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Create sessions.jsonl
        run: |
          echo '${{ secrets.SESSIONS }}' > sessions.jsonl
      - name: Create users.json
        run: |
          echo '${{ vars.USERS }}' > users.json
      - name: Docker Compose
        run: |
          docker compose up -d
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Get RSS
        run: |
          ruby get-rss.rb
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist